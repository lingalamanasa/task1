<html>
    <head>
        <title> Javascript DataTypes </title>
    </head>
    <body>
        <h1> Javascript DataTypes </h1>
        <script>
            //DataTypes
            //Task 1
            let name1="manasa";
            console.log(name1);
            //Task 2
            let skill="javascript";
            console.log(typeof(skill));
            //Task 3
            let age=22;
            console.log(typeof(age));
            //Task 4
            let  isStudent = true;
            console.log(typeof(isStudent));
            // Task 5
            let salary;
            console.log(salary);
            
            //Array Tasks
            //Task 6
            let fruits=["apple","banana","mango","orange","kiwi"];
            console.log(fruits);
            //Task 7
            console.log(fruits[0]);
            //Task 8
            console.log(fruits[2]);
            //Task 9
            //console.log(fruits[4]);
            console.log(fruits[fruits.length-1]);
            //Task 10
            let array=[10,20,30,40,50];
            console.log(array[1]);
            console.log(array[3]);
            
            //Object Tasks
            //Task 11
            let persondetails={
                name:"manasa",
                age:"23",
                city:"hyderabad"
            }
            console.log(persondetails);
            //Task 12
            console.log(persondetails.name);
            //Task 13
            let persondetails1={
                name:"manasa",
                age:"23",
                city:"hyderabad",
                skill_: ["HTML","CSS","JS"]

            }
            
            console.log(persondetails1.skill_[1]);
            
            //Task 14
            let cardetails={
                brand:"Venue",
                model:"Hyundai",
                price:1400000
            }
            
            console.log(cardetails.price);
            //Task 15
            let fruitCategory={
                red:["apple","cherry"],
                yellow:["banana","mango"],
                green:["kiwi","grapes"]
            }
            console.log(fruitCategory.yellow[0]);

            //Arithmetic Operators
            //Task 16
            let a = 8
            let b = 4
            console.log(a+b);
            //Task 17
            console.log(a-b);
            //Task 18
            console.log(a*b);
            //Task 19
            console.log(a/b);
            //Task 20
            console.log(a%b);

            //Exponential Operator
            //Task 21
            let c=3;
            let d=2;
            console.log(c**d);
            //Task 22
            let m=2;
            let n=4;
            console.log(m**n);

            //Increment / Decrement
            //Task 23
            let num= 5;
            num++;
            console.log(num);
            //Task 24
            let num1 = 10;
             num1--;
             console.log(num1);
             //Task 25
             let x = 6;
             let y = x++;
             console.log(x);
             console.log(y);
             //Task 26
             let a1 = 4;
             let b1 = ++a1;
             console.log(a1);
             console.log(b1);

             //Assignment Operators
             //Task 27
             let value = 10;
             value += 5;
             console.log(value);
             //Task 28
             let value1 = 20;
             value1 -= 3;
             console.log(value1);
             //Task 29
             let value2 = 6;
              value2 *= 2;
              console.log(value2);
              //Task 30
              let value_ = 20
              value_ %= 3
              console.log(value_);

              //Comparison Operators
              //Task 31
              console.log(10 == "10");
              //Task 32
              console.log(10 === "10");
              // Task 33
              console.log(15 > 20);
              //Task 34
              console.log(5 <= 5);

              //Logical Operators
              //Task 35
              console.log(10 > 5 && 5 > 2);
              // Task 36
              console.log(10 < 5 || 8 > 2);
              //Task 37
              console.log(!(5 === "5"));
              
              //Ternary Operator
              //Task 38
              let age1= 20;
              console.log(age1 >= 18 ? "Adult" : "Minor");

              //Task 39
              let password = 1;
              console.log(password=1? "Login success":"Wrong password");
              //Task 40
              //String Operations
              let firstName = "Spider"
              let lastName = "Man"
              //Concatenation +
              console.log(firstName + " " + lastName);
              //Template string `${}`
              console.log(`${firstName} ${lastName}`);
            </script>
     </body>
</html>
             
              
              

              
              
              
              
              
              
              
              
             
    
             
             
             
             
             
            
            
            
            
            
            
            
            
            
            
            
            
            

        </script>
    </body>
</html>
