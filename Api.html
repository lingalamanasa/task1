<!DOCTYPE html>
<html>
<head>
    <title>Product Dashboard</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        #controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        #products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px gray;
        }

        img {
            width: 100px;
            height: 100px;
        }

        button {
            margin-top: 5px;
            padding: 5px 10px;
            cursor: pointer;
        }

        #loader {
            text-align: center;
            font-size: 20px;
        }

        #error {
            color: red;
            text-align: center;
        }

        /* Modal */
        #modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
        }

        #modalContent {
            background: white;
            margin: 100px auto;
            padding: 20px;
            width: 300px;
            text-align: center;
        }
    </style>

</head>
<body>  

<h1> Product Dashboard</h1>


<div id="controls">
    <input type="text" id="search" placeholder="Search products...">

    <select id="category">
        <option value="all">All</option>
        <option value="electronics">Electronics</option>
        <option value="jewelery">Jewelery</option>
        <option value="men's clothing">Men</option>
        <option value="women's clothing">Women</option>
    </select>

    <button onclick="sortLow()">Low→High</button>
    <button onclick="sortHigh()">High→Low</button>
</div>

<p id="loader">Loading...</p>
<p id="error"></p>

<div id="products"></div>

<!-- Modal -->
<div id="modal">
    <div id="modalContent">
        <button onclick="closeModal()">Close</button>
        <div id="modalData"></div>
    </div>
</div>
<script>

const API = "https://fakestoreapi.com/products";
let allProducts = [];

// Fetch API
async function getData() {
    try {
        document.getElementById("loader").style.display = "block";

        const res = await fetch(API);
        const data = await res.json();

        allProducts = data;
        showProducts(data);

        document.getElementById("loader").style.display = "none";
    } catch (e) {
        document.getElementById("loader").style.display = "none";
        document.getElementById("error").innerText = "Error loading data";
    }
}

// Display Products
function showProducts(products) {
    const container = document.getElementById("products");
    container.innerHTML = "";

    products.forEach(p => {
        container.innerHTML += `
            <div class="card">
                <img src="${p.image}">
                <h4>${p.title.slice(0,20)}</h4>
                <p>${p.description.slice(0,60)}...</p>
                <button>₹ ${p.price}</button><br>
                <button onclick='viewMore(${JSON.stringify(p)})'>View More</button>
            </div>
        `;
    });
}

// Search
document.getElementById("search").addEventListener("input", function(e){
    const value = e.target.value.toLowerCase();
    const filtered = allProducts.filter(p =>
        p.title.toLowerCase().includes(value)
    );
    showProducts(filtered);
});

// Category Filter
document.getElementById("category").addEventListener("change", function(e){
    const val = e.target.value;

    if(val === "all"){
        showProducts(allProducts);
    } else {
        const filtered = allProducts.filter(p => p.category === val);
        showProducts(filtered);
    }
});

// Sorting
function sortLow(){
    const sorted = [...allProducts].sort((a,b)=>a.price - b.price);
    showProducts(sorted);
}

function sortHigh(){
    const sorted = [...allProducts].sort((a,b)=>b.price - a.price);
    showProducts(sorted);
}

// Modal
function viewMore(product){
    document.getElementById("modal").style.display = "block";

    document.getElementById("modalData").innerHTML = `
        <h3>${product.title}</h3>
        <img src="${product.image}" width="120"><br>
        <p>${product.description}</p>
        <h4>₹ ${product.price}</h4>
    `;
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

// Call function
getData();

</script>

</body>
</html>
